name: Lichess Tactics Tracker

concurrency:
  group: tactics-tracker
  cancel-in-progress: false

on:
  schedule:
    - cron: "0 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  fetch-and-commit:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 🔥 WICHTIG für rebase!

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install requests

      # Step 1: fetch stats
      - name: Fetch Lichess stats
        env:
          LICHESS_API_KEY: ${{ secrets.LICHESS_API_KEY }}
        run: python fetch_lichess_stats.py

      # Step 2: generate leaderboard
      - name: Generate leaderboard
        run: python generate_leaderboard.py

      # Step 3: commit + push (FIXED 🔥)
      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add data/

          git commit -m "chore: tactics snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "No changes"

          # 🔥 DAS ist der entscheidende Fix
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            sleep 2
          done
