name: Lichess Tactics Tracker

on:
  schedule:
    - cron: "0  * * * *"   # volle Stunde
    - cron: "10 * * * *"
    - cron: "20 * * * *"
    - cron: "30 * * * *"
    - cron: "40 * * * *"
    - cron: "50 * * * *"
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# Nie zwei Runs gleichzeitig — zweiter wartet bis erster fertig
concurrency:
  group: tactics-tracker
  cancel-in-progress: false

jobs:
  # ── Stats-Update: läuft zur vollen Stunde ─────────────────────────────────
  # KEIN if-Filter mehr — stattdessen prüft das Skript selbst ob es
  # bereits einen Run in dieser Stunde gab und überspringt dann.
  update-stats:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Prüfe ob Stats-Update nötig ist
        id: check
        run: |
          # Läuft nur zur vollen Stunde (Minute == 0) oder bei manuellem Trigger
          MINUTE=$(date -u +%M)
          if [ "$MINUTE" = "00" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> $GITHUB_OUTPUT
            echo "Minute=$MINUTE → Stats-Update wird ausgeführt."
          else
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Minute=$MINUTE → Kein Stats-Update (nur zur vollen Stunde)."
          fi

      - name: Stats abrufen
        if: steps.check.outputs.run == 'true'
        env:
          LICHESS_API_KEY: ${{ secrets.LICHESS_API_KEY }}
        run: python fetch_lichess_stats.py

      - name: Rangliste generieren
        if: steps.check.outputs.run == 'true'
        run: python generate_leaderboard.py

      - name: Commit & Push
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: stats-update $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "Keine Änderungen"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            sleep $((i * 5))
          done

      - name: Workflow aktiv halten
        if: steps.check.outputs.run == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const wfs = await github.rest.actions.listRepoWorkflows({ owner, repo });
            for (const wf of wfs.data.workflows) {
              if (wf.state === 'disabled_inactivity') {
                await github.rest.actions.enableWorkflow({ owner, repo, workflow_id: wf.id });
                console.log(`Reaktiviert: ${wf.name}`);
              }
            }

  # ── Join-Detection: läuft alle 10 Minuten AUSSER zur vollen Stunde ────────
  detect-joins:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      - name: Prüfe ob Join-Detection nötig ist
        id: check
        run: |
          MINUTE=$(date -u +%M)
          if [ "$MINUTE" = "00" ] && [ "${{ github.event_name }}" != "workflow_dispatch" ]; then
            echo "run=false" >> $GITHUB_OUTPUT
            echo "Minute=$MINUTE → Übersprungen (update-stats übernimmt zur vollen Stunde)."
          else
            echo "run=true" >> $GITHUB_OUTPUT
            echo "Minute=$MINUTE → Join-Detection wird ausgeführt."
          fi

      - name: Neue Mitglieder erkennen & Baseline speichern
        if: steps.check.outputs.run == 'true'
        env:
          LICHESS_API_KEY: ${{ secrets.LICHESS_API_KEY }}
        run: python detect_new_members.py

      - name: Rangliste aktualisieren
        if: steps.check.outputs.run == 'true'
        run: python generate_leaderboard.py

      - name: Commit & Push
        if: steps.check.outputs.run == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: join-detection $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "Keine neuen Mitglieder"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            sleep $((i * 5))
          done
