name: Lichess Tactics Tracker

on:
  workflow_dispatch:   # wird von cron-job.org alle 10 Minuten getriggert

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: tactics-tracker
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - run: pip install requests

      # ── Immer: neue Mitglieder erkennen & Baselines pflegen ───────────────
      - name: Neue Mitglieder & Baselines
        env:
          LICHESS_API_KEY: ${{ secrets.LICHESS_API_KEY }}
        run: |
          python detect_new_members.py
          python update_baselines.py

      # ── Nur zur vollen Stunde: Stats für alle abrufen ─────────────────────
      - name: Stats abrufen (nur zur vollen Stunde)
        env:
          LICHESS_API_KEY: ${{ secrets.LICHESS_API_KEY }}
        run: |
          MINUTE=$(date -u +%M)
          if [ "$MINUTE" = "00" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "Minute=$MINUTE → Stats-Update wird ausgeführt."
            python fetch_lichess_stats.py
          else
            echo "Minute=$MINUTE → Kein Stats-Update (nur zur vollen Stunde)."
          fi

      # ── Immer: Rangliste neu generieren ───────────────────────────────────
      - name: Rangliste generieren
        run: python generate_leaderboard.py

      # ── Commit & Push ──────────────────────────────────────────────────────
      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git commit -m "chore: update $(date -u +'%Y-%m-%dT%H:%M:%SZ')" || echo "Keine Änderungen"
          for i in 1 2 3; do
            git pull --rebase origin main && git push origin main && break
            echo "Retry $i..."
            sleep $((i * 5))
          done

      # ── Workflow aktiv halten ──────────────────────────────────────────────
      - name: Workflow aktiv halten
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo } = context.repo;
            const wfs = await github.rest.actions.listRepoWorkflows({ owner, repo });
            for (const wf of wfs.data.workflows) {
              if (wf.state === 'disabled_inactivity') {
                await github.rest.actions.enableWorkflow({ owner, repo, workflow_id: wf.id });
                console.log(`Reaktiviert: ${wf.name}`);
              }
            }