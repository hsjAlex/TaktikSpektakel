name: Wöchentlicher History-Cleanup

on:
  schedule:
    - cron: "0 3 * * 0"   # Jeden Sonntag um 03:00 UTC
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  cleanup:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Alte History-Einträge entfernen (älter als 90 Tage)
        run: python cleanup_old_history.py

      - name: Backup-Dateien entfernen (werden nicht ins Repo gepusht)
        run: rm -f data/tactics_history_backup_*.csv

      - name: Commit & Push
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/tactics_history.csv
          git commit -m "chore: wöchentlicher History-Cleanup $(date -u +'%Y-%m-%d')" || echo "Keine Änderungen"
          git pull --rebase origin main && git push origin main