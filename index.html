<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hessische Schachjugend — Tactic Leaderboard</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Crimson+Pro:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0d0d;
    --surface:  #141414;
    --border:   #2a2a2a;
    --gold:     #c8a84b;
    --gold-dim: #7a6230;
    --silver:   #9aa5b1;
    --bronze:   #b87333;
    --text:     #e8e0d0;
    --muted:    #5a5550;
    --accent:   #e8c96d;
    --green:    #4a8c5c;
    --red:      #8c4a4a;
    --white-sq: #1e1e1e;
    --black-sq: #111111;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* ── chess-pattern background ── */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      repeating-conic-gradient(var(--white-sq) 0% 25%, var(--black-sq) 0% 50%);
    background-size: 48px 48px;
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  /* ── noise overlay ── */
  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ── header ── */
  header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }

  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }

  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 9vw, 96px);
    line-height: 0.9;
    letter-spacing: 0.03em;
    color: var(--text);
    margin-bottom: 16px;
  }

  h1 span {
    color: var(--gold);
    display: block;
  }

  .header-meta {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--muted);
    margin-top: 12px;
  }

  .header-meta strong {
    color: var(--silver);
    font-style: normal;
    font-weight: 600;
  }

  /* ── controls ── */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }

  .search-wrap {
    flex: 1;
    min-width: 200px;
    position: relative;
  }

  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 14px 10px 36px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }

  .search-wrap input:focus { border-color: var(--gold-dim); }
  .search-wrap input::placeholder { color: var(--muted); }

  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }

  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }

  .filter-btn:hover,
  .filter-btn.active {
    border-color: var(--gold-dim);
    color: var(--gold);
  }

  .player-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    padding: 10px 0;
    margin-left: auto;
  }

  /* ── podium (top 3) ── */
  .podium {
    display: grid;
    grid-template-columns: 1fr 1.1fr 1fr;
    gap: 12px;
    margin-bottom: 40px;
  }

  .podium-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px 16px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    animation: fadeUp 0.5s ease both;
  }

  .podium-card:hover {
    transform: translateY(-3px);
  }

  .podium-card.p1 { border-color: var(--gold-dim); order: 2; }
  .podium-card.p2 { border-color: #3a3a3a; order: 1; align-self: end; }
  .podium-card.p3 { border-color: #2e2218; order: 3; align-self: end; }

  .podium-card.p1 { animation-delay: 0.1s; }
  .podium-card.p2 { animation-delay: 0.2s; }
  .podium-card.p3 { animation-delay: 0.3s; }

  .podium-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
  }
  .podium-card.p1::before { background: var(--gold); }
  .podium-card.p2::before { background: var(--silver); }
  .podium-card.p3::before { background: var(--bronze); }

  .podium-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 48px;
    line-height: 1;
    margin-bottom: 4px;
  }
  .p1 .podium-rank { color: var(--gold); }
  .p2 .podium-rank { color: var(--silver); }
  .p3 .podium-rank { color: var(--bronze); }

  .podium-piece {
    font-size: 28px;
    margin-bottom: 8px;
  }

  .podium-name {
    font-family: 'Crimson Pro', serif;
    font-size: 18px;
    font-weight: 600;
    margin-bottom: 4px;
    word-break: break-all;
  }

  .podium-name a {
    color: var(--text);
    text-decoration: none;
    transition: color 0.15s;
  }
  .podium-name a:hover { color: var(--gold); }

  .podium-solved {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    text-transform: uppercase;
    margin-bottom: 8px;
  }

  .podium-solved strong {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 22px;
    letter-spacing: 0.05em;
    display: block;
    color: var(--text);
  }

  .podium-rating {
    display: inline-block;
    background: rgba(200,168,75,0.08);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-size: 11px;
    padding: 3px 8px;
    letter-spacing: 0.08em;
  }

  /* ── table ── */
  .table-wrap {
    border: 1px solid var(--border);
    overflow: hidden;
  }

  .table-header {
    display: grid;
    grid-template-columns: 44px 1fr 100px 100px 80px 80px;
    padding: 10px 16px;
    background: #0f0f0f;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    gap: 8px;
  }

  .table-header span { cursor: pointer; transition: color 0.15s; user-select: none; }
  .table-header span:hover { color: var(--gold); }
  .table-header span.sorted { color: var(--gold); }

  .row {
    display: grid;
    grid-template-columns: 44px 1fr 100px 100px 80px 80px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    gap: 8px;
    min-height: 52px;
    transition: background 0.15s;
    animation: fadeIn 0.3s ease both;
  }

  .row:last-child { border-bottom: none; }
  .row:hover { background: rgba(200,168,75,0.04); }

  .row.top3 { background: rgba(200,168,75,0.03); }

  .cell-rank {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    color: var(--muted);
    text-align: center;
  }

  .row.top3 .cell-rank { color: var(--gold); }

  .cell-player {
    display: flex;
    align-items: center;
    gap: 10px;
    min-width: 0;
  }

  .avatar {
    width: 30px;
    height: 30px;
    background: var(--border);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 13px;
    flex-shrink: 0;
    border: 1px solid #222;
  }

  .player-name {
    font-family: 'Crimson Pro', serif;
    font-size: 15px;
    font-weight: 600;
    white-space: nowrap;
    overflow: hidden;
    text-overflow: ellipsis;
  }

  .player-name a {
    color: var(--text);
    text-decoration: none;
    transition: color 0.15s;
  }

  .player-name a:hover { color: var(--gold); }

  .player-name a::after {
    content: ' ↗';
    font-size: 10px;
    color: var(--muted);
    opacity: 0;
    transition: opacity 0.15s;
  }

  .player-name a:hover::after { opacity: 1; }

  .cell-solved {
    font-family: 'Bebas Neue', sans-serif;
    font-size: 20px;
    letter-spacing: 0.05em;
    text-align: right;
  }

  .cell-rating {
    text-align: right;
    color: var(--silver);
    font-size: 13px;
  }

  .cell-storm, .cell-racer {
    text-align: right;
    color: var(--muted);
    font-size: 12px;
  }

  .cell-storm span, .cell-racer span {
    display: inline-flex;
    align-items: center;
    gap: 4px;
  }

  .badge {
    display: inline-block;
    font-size: 10px;
    padding: 1px 5px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    vertical-align: middle;
  }

  .badge-gold   { background: rgba(200,168,75,0.15); color: var(--gold); border: 1px solid var(--gold-dim); }
  .badge-silver { background: rgba(154,165,177,0.12); color: var(--silver); border: 1px solid #4a5260; }
  .badge-bronze { background: rgba(184,115,51,0.12); color: var(--bronze); border: 1px solid #5a3820; }

  /* ── empty state ── */
  .empty {
    padding: 60px 20px;
    text-align: center;
    color: var(--muted);
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 18px;
  }

  /* ── footer ── */
  footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
  }

  footer a {
    color: var(--gold-dim);
    text-decoration: none;
    transition: color 0.15s;
  }
  footer a:hover { color: var(--gold); }

  /* ── animations ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(16px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  /* ── responsive ── */
  @media (max-width: 640px) {
    .podium { grid-template-columns: 1fr; }
    .podium-card { order: unset !important; }
    .table-header,
    .row { grid-template-columns: 36px 1fr 80px 80px; }
    .cell-storm, .cell-racer { display: none; }
    .table-header .col-storm,
    .table-header .col-racer { display: none; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="header-eyebrow">♟ Hessische Schachjugend</div>
    <h1>Tactic<span>Scramble</span></h1>
    <p class="header-meta">
      Puzzle leaderboard — tracking <strong id="total-players">—</strong> players
      &nbsp;·&nbsp; updated <strong id="last-updated">—</strong>
    </p>
  </header>

  <!-- podium -->
  <div class="podium" id="podium"></div>

  <!-- controls -->
  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Search player…" autocomplete="off">
    </div>
    <button class="filter-btn active" data-sort="puzzles_since_tracking">Puzzles solved</button>
    <button class="filter-btn" data-sort="puzzle_rating_now">Puzzle rating</button>
    <button class="filter-btn" data-sort="avg_bullet_blitz_rapid">Avg rating</button>
    <span class="player-count" id="showing-count"></span>
  </div>

  <!-- table -->
  <div class="table-wrap">
    <div class="table-header">
      <span>#</span>
      <span>Player</span>
      <span class="sorted" id="th-solved" style="text-align:right">Solved ▾</span>
      <span id="th-rating" style="text-align:right">Puzzle Rtg</span>
      <span class="col-storm" style="text-align:right">Storm</span>
      <span class="col-racer" style="text-align:right">Racer</span>
    </div>
    <div id="table-body"></div>
  </div>

  <footer>
    <span>Data via <a href="https://lichess.org/api" target="_blank" rel="noopener">Lichess API</a> · auto-updated daily at 00:00 UTC</span>
    <a href="https://lichess.org/team/hessische-schachjugend" target="_blank" rel="noopener">→ Team page</a>
  </footer>

</div>

<script>
// ── Parse CSV ──────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/\r/g, ''));
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim().replace(/\r/g, ''));
    const obj = {};
    headers.forEach((h, i) => obj[h] = vals[i] || '');
    return obj;
  });
}

// ── Chess piece per rank ───────────────────────────────────────────────────
function piece(rank) {
  if (rank === 1) return '♚';
  if (rank === 2) return '♛';
  if (rank === 3) return '♜';
  if (rank <= 10) return '♝';
  return '♟';
}

function initials(username) {
  return username.slice(0, 2).toUpperCase();
}

function fmt(val, fallback = '—') {
  if (val === '' || val === undefined || val === null || val === 'None') return fallback;
  const n = parseFloat(val);
  return isNaN(n) ? fallback : Math.round(n).toLocaleString();
}

function lichessUrl(username) {
  return `https://lichess.org/@/${username}`;
}

// ── State ──────────────────────────────────────────────────────────────────
let allPlayers = [];
let sortKey    = 'puzzles_since_tracking';
let searchTerm = '';

// ── Render podium ──────────────────────────────────────────────────────────
function renderPodium(players) {
  const top3 = players.slice(0, 3);
  const podium = document.getElementById('podium');
  const classes = ['p2', 'p1', 'p3'];
  const orders  = [2, 1, 3]; // display order: 2nd, 1st, 3rd
  const medals  = ['badge-silver', 'badge-gold', 'badge-bronze'];
  const pieces  = ['♛', '♚', '♜'];

  // Arrange: index 0=2nd place, 1=1st place, 2=3rd place
  const arranged = [top3[1], top3[0], top3[2]];

  podium.innerHTML = arranged.map((p, i) => {
    if (!p) return '';
    const cls = classes[i];
    const solved = fmt(p.puzzles_since_tracking);
    const rating = fmt(p.puzzle_rating_now);
    return `
      <div class="podium-card ${cls}" style="order:${orders[i]}">
        <div class="podium-piece">${pieces[i]}</div>
        <div class="podium-rank">${p.rank}</div>
        <div class="podium-name">
          <a href="${lichessUrl(p.username)}" target="_blank" rel="noopener">${p.username}</a>
        </div>
        <div class="podium-solved">
          <strong>${solved}</strong>
          puzzles solved
        </div>
        <div class="podium-rating">⊕ ${rating}</div>
      </div>`;
  }).join('');
}

// ── Render table ───────────────────────────────────────────────────────────
function renderTable(players) {
  const body = document.getElementById('table-body');

  if (players.length === 0) {
    body.innerHTML = '<div class="empty">No players found matching your search.</div>';
    return;
  }

  body.innerHTML = players.map((p, i) => {
    const isTop3 = parseInt(p.rank) <= 3;
    const solved = fmt(p.puzzles_since_tracking);
    const rating = fmt(p.puzzle_rating_now);
    const storm  = fmt(p.storm_best_score);
    const racer  = fmt(p.racer_best_score);

    let badgeHtml = '';
    if (p.rank === '1' || p.rank === 1) badgeHtml = '<span class="badge badge-gold ml">♚</span>';
    else if (p.rank === '2' || p.rank === 2) badgeHtml = '<span class="badge badge-silver ml">♛</span>';
    else if (p.rank === '3' || p.rank === 3) badgeHtml = '<span class="badge badge-bronze ml">♜</span>';

    return `
      <div class="row${isTop3 ? ' top3' : ''}" style="animation-delay:${Math.min(i * 0.025, 0.5)}s">
        <div class="cell-rank">${p.rank}</div>
        <div class="cell-player">
          <div class="avatar">${initials(p.username)}</div>
          <div class="player-name">
            <a href="${lichessUrl(p.username)}" target="_blank" rel="noopener">${p.username}</a>${badgeHtml}
          </div>
        </div>
        <div class="cell-solved">${solved}</div>
        <div class="cell-rating">${rating}</div>
        <div class="cell-storm">${storm === '—' ? '<span style="color:#333">—</span>' : `<span>⚡ ${storm}</span>`}</div>
        <div class="cell-racer">${racer === '—' ? '<span style="color:#333">—</span>' : `<span>🏁 ${racer}</span>`}</div>
      </div>`;
  }).join('');
}

// ── Filter + sort ──────────────────────────────────────────────────────────
function getFiltered() {
  let list = [...allPlayers];

  if (searchTerm) {
    list = list.filter(p => p.username.toLowerCase().includes(searchTerm));
  }

  list.sort((a, b) => {
    const va = parseFloat(a[sortKey]) || 0;
    const vb = parseFloat(b[sortKey]) || 0;
    return vb - va;
  });

  // Re-rank after sort/filter
  list.forEach((p, i) => p._displayRank = i + 1);

  return list;
}

function render() {
  const filtered = getFiltered();

  document.getElementById('showing-count').textContent =
    searchTerm ? `${filtered.length} of ${allPlayers.length} players` : `${allPlayers.length} players`;

  if (!searchTerm && sortKey === 'puzzles_since_tracking') {
    renderPodium(allPlayers.slice(0, 3));
    document.getElementById('podium').style.display = 'grid';
  } else {
    document.getElementById('podium').style.display = 'none';
  }

  // Use original rank for display
  const display = filtered.map(p => ({ ...p, rank: p._displayRank }));
  renderTable(display);
}

// ── Load data ──────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const res  = await fetch('data/leaderboard.csv');
    const text = await res.text();
    allPlayers = parseCSV(text).filter(p => p.username);

    const lastSeen = allPlayers[0]?.last_seen || '—';
    document.getElementById('last-updated').textContent = lastSeen;
    document.getElementById('total-players').textContent = allPlayers.length;

    render();
  } catch (e) {
    document.getElementById('table-body').innerHTML =
      '<div class="empty">Could not load leaderboard.csv — make sure it lives at data/leaderboard.csv relative to this page.</div>';
    console.error(e);
  }
}

// ── Events ─────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.trim().toLowerCase();
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    sortKey = btn.dataset.sort;
    render();
  });
});

loadData();
</script>
</body>
</html>
