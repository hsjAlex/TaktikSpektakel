<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TaktikSpektakel — Rangliste</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Crimson+Pro:ital,wght@0,300;0,600;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:       #0d0d0d;
    --surface:  #141414;
    --border:   #2a2a2a;
    --gold:     #c8a84b;
    --gold-dim: #7a6230;
    --silver:   #9aa5b1;
    --bronze:   #b87333;
    --text:     #f0ead8;
    --muted:    #8a8480;
    --accent:   #e8c96d;
    --green:    #4a8c5c;
    --red:      #8c4a4a;
    --white-sq: #1e1e1e;
    --black-sq: #111111;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 13px;
    min-height: 100vh;
    overflow-x: clip;
  }

  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image: repeating-conic-gradient(var(--white-sq) 0% 25%, var(--black-sq) 0% 50%);
    background-size: 48px 48px;
    opacity: 0.18;
    pointer-events: none;
    z-index: 0;
  }

  body::after {
    content: '';
    position: fixed;
    inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
    pointer-events: none;
    z-index: 0;
    opacity: 0.4;
  }

  .wrap {
    position: relative;
    z-index: 1;
    max-width: 900px;
    margin: 0 auto;
    padding: 0 20px 80px;
  }

  /* ── header ── */
  header {
    padding: 60px 0 40px;
    border-bottom: 1px solid var(--border);
    margin-bottom: 48px;
  }
  .header-eyebrow {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
  }
  h1 {
    font-family: 'Bebas Neue', sans-serif;
    font-size: clamp(52px, 9vw, 96px);
    line-height: 0.9;
    letter-spacing: 0.03em;
    color: var(--text);
    margin-bottom: 16px;
  }
  h1 span { color: var(--gold); display: block; }
  .header-meta {
    font-family: 'Crimson Pro', serif;
    font-style: italic;
    font-size: 16px;
    color: var(--muted);
    margin-top: 12px;
  }
  .header-meta strong { color: var(--silver); font-style: normal; font-weight: 600; }

  /* ── controls ── */
  .controls {
    display: flex;
    gap: 12px;
    margin-bottom: 24px;
    flex-wrap: wrap;
    align-items: center;
  }
  .search-wrap { flex: 1; min-width: 200px; position: relative; }
  .search-wrap input {
    width: 100%;
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    padding: 10px 14px 10px 36px;
    outline: none;
    transition: border-color 0.2s;
    letter-spacing: 0.05em;
  }
  .search-wrap input:focus { border-color: var(--gold-dim); }
  .search-wrap input::placeholder { color: var(--muted); }
  .search-icon {
    position: absolute;
    left: 12px;
    top: 50%;
    transform: translateY(-50%);
    color: var(--muted);
    font-size: 14px;
    pointer-events: none;
  }
  .filter-btn {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--muted);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.1em;
    text-transform: uppercase;
    padding: 10px 14px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
  }
  .filter-btn:hover,
  .filter-btn.active { border-color: var(--gold-dim); color: var(--gold); }
  .player-count {
    font-size: 11px;
    color: var(--muted);
    letter-spacing: 0.1em;
    padding: 10px 0;
    margin-left: auto;
  }

  /* ── podium ── */
  .podium {
    display: grid;
    grid-template-columns: 1fr 1.1fr 1fr;
    gap: 12px;
    margin-bottom: 40px;
    transition: all 0.3s ease;
  }
  /* Kompakt-Modus: kleine Leiste statt volles Podium */
  .podium-compact {
    grid-template-columns: 1fr 1fr 1fr !important;
    gap: 6px;
    margin-bottom: 16px;
    opacity: 0.6;
  }
  .podium-compact .podium-card {
    padding: 8px 12px !important;
    order: unset !important;
    align-self: unset !important;
  }
  .podium-compact .podium-piece { display: none; }
  .podium-compact .podium-solved { display: none; }
  .podium-compact .podium-rating { display: none; }
  .podium-compact .podium-rank { font-size: 20px !important; display: inline; margin: 0 4px 0 0; }
  .podium-compact .podium-name { font-size: 13px !important; display: inline; }
  .podium-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 24px 16px 20px;
    text-align: center;
    position: relative;
    overflow: hidden;
    transition: transform 0.2s, border-color 0.2s;
    animation: fadeUp 0.5s ease both;
  }
  .podium-card:hover { transform: translateY(-3px); }
  .podium-card.p1 { border-color: var(--gold-dim); order: 2; }
  .podium-card.p2 { border-color: #3a3a3a; order: 1; align-self: end; }
  .podium-card.p3 { border-color: #2e2218; order: 3; align-self: end; }
  .podium-card.p1 { animation-delay: 0.1s; }
  .podium-card.p2 { animation-delay: 0.2s; }
  .podium-card.p3 { animation-delay: 0.3s; }
  .podium-card::before {
    content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px;
  }
  .podium-card.p1::before { background: var(--gold); }
  .podium-card.p2::before { background: var(--silver); }
  .podium-card.p3::before { background: var(--bronze); }
  .podium-rank { font-family: 'Bebas Neue', sans-serif; font-size: 48px; line-height: 1; margin-bottom: 4px; }
  .p1 .podium-rank { color: var(--gold); }
  .p2 .podium-rank { color: var(--silver); }
  .p3 .podium-rank { color: var(--bronze); }
  .podium-piece { font-size: 28px; margin-bottom: 8px; }
  .podium-name { font-family: 'Crimson Pro', serif; font-size: 18px; font-weight: 600; margin-bottom: 4px; word-break: break-all; }
  .podium-name a { color: var(--text); text-decoration: none; transition: color 0.15s; }
  .podium-name a:hover { color: var(--gold); }
  .podium-solved { font-size: 11px; color: var(--muted); letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 8px; }
  .podium-solved strong { font-family: 'Bebas Neue', sans-serif; font-size: 22px; letter-spacing: 0.05em; display: block; color: var(--text); }
  .podium-rating {
    display: inline-block;
    background: rgba(200,168,75,0.08);
    border: 1px solid var(--gold-dim);
    color: var(--gold);
    font-size: 11px;
    padding: 3px 8px;
    letter-spacing: 0.08em;
  }

  /* ── table scroll wrapper ──
     On mobile this enables horizontal scroll if needed,
     but the mobile media query collapses to 3 columns so it usually won't be needed. */
  .table-scroll {
    overflow-x: auto;
    -webkit-overflow-scrolling: touch;
    border: 1px solid var(--border);
  }
  .table-wrap {
    /* keeps columns from collapsing on desktop */
    min-width: 480px;
  }

  /* ── table ── */
  .table-header {
    display: grid;
    grid-template-columns: 44px 1fr 110px 120px 90px 90px 90px;
    padding: 10px 16px;
    background: #0f0f0f;
    border-bottom: 1px solid var(--border);
    color: var(--muted);
    font-size: 10px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    gap: 8px;
  }
  .table-header span { cursor: pointer; transition: color 0.15s; user-select: none; }
  .table-header span:not([data-sort]) { cursor: default; }
  .table-header span:hover { color: var(--text); }
  .table-header span[data-sort]:hover { color: var(--gold); }
  .table-header span.sorted { color: var(--gold); }

  .row {
    display: grid;
    grid-template-columns: 44px 1fr 110px 120px 90px 90px 90px;
    padding: 0 16px;
    border-bottom: 1px solid var(--border);
    align-items: center;
    gap: 8px;
    min-height: 52px;
    transition: background 0.15s;
    animation: fadeIn 0.3s ease both;
  }
  .row:last-child { border-bottom: none; }
  .row:hover { background: rgba(200,168,75,0.04); }
  .row.top3 { background: rgba(200,168,75,0.03); }

  .cell-rank { font-family: 'Bebas Neue', sans-serif; font-size: 20px; color: var(--muted); text-align: center; }
  .row.top3 .cell-rank { color: var(--gold); }

  .cell-player { display: flex; align-items: center; gap: 10px; min-width: 0; }
  .avatar {
    width: 30px; height: 30px;
    background: var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 13px; flex-shrink: 0;
    border: 1px solid #222;
  }
  .player-name { font-family: 'Crimson Pro', serif; font-size: 15px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .player-name a { color: var(--text); text-decoration: none; transition: color 0.15s; }
  .player-name a:hover { color: var(--gold); }
  .player-name a::after { content: ' ↗'; font-size: 10px; color: var(--muted); opacity: 0; transition: opacity 0.15s; }
  .player-name a:hover::after { opacity: 1; }

  .cell-solved  { font-family: 'Bebas Neue', sans-serif; font-size: 20px; letter-spacing: 0.05em; text-align: right; }
  .cell-rating  { text-align: right; color: var(--silver); font-size: 13px; }
  .cell-avg     { text-align: right; color: var(--muted);  font-size: 13px; }
  .cell-storm, .cell-racer { text-align: right; color: var(--muted); font-size: 12px; }
  .cell-storm span, .cell-racer span { display: inline-flex; align-items: center; gap: 4px; }

  .badge { display: inline-block; font-size: 10px; padding: 1px 5px; letter-spacing: 0.08em; text-transform: uppercase; vertical-align: middle; }
  .badge-gold   { background: rgba(200,168,75,0.15);  color: var(--gold);   border: 1px solid var(--gold-dim); }
  .badge-silver { background: rgba(154,165,177,0.12); color: var(--silver); border: 1px solid #4a5260; }
  .badge-bronze { background: rgba(184,115,51,0.12);  color: var(--bronze); border: 1px solid #5a3820; }

  .empty { padding: 60px 20px; text-align: center; color: var(--muted); font-family: 'Crimson Pro', serif; font-style: italic; font-size: 18px; }

  footer {
    margin-top: 48px;
    padding-top: 24px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    flex-wrap: wrap;
    gap: 12px;
    color: var(--muted);
    font-size: 11px;
    letter-spacing: 0.08em;
  }
  footer a { color: var(--gold-dim); text-decoration: none; transition: color 0.15s; }
  footer a:hover { color: var(--gold); }

  @keyframes fadeUp  { from { opacity:0; transform:translateY(16px); } to { opacity:1; transform:translateY(0); } }
  @keyframes fadeIn  { from { opacity:0; }                             to { opacity:1; } }

  /* ── mobile ──────────────────────────────────────────────────────────────
     On screens ≤ 640px collapse to 3 columns: Rank | Spieler | active col.
     JS adds/removes .col-hidden to every non-active data column.           */
  @media (max-width: 640px) {
    .podium { grid-template-columns: 1fr; }
    .podium-card { order: unset !important; }

    .table-header,
    .row { grid-template-columns: 36px 1fr 90px; }

    /* all data cols hidden by default; JS removes this from the active one */
    .col-hidden { display: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">

  <header>
    <div class="header-eyebrow">♟ Hessische Schachjugend</div>
    <h1>Taktik<span>Spektakel</span></h1>
    <p class="header-meta">
      Puzzle-Rangliste — <strong id="total-players">—</strong> Spieler
      &nbsp;·&nbsp; aktualisiert <strong id="last-updated">—</strong>
    </p>
  </header>

  <div class="podium" id="podium"></div>

  <div class="controls">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="search" placeholder="Suche Spieler..." autocomplete="off">
    </div>
    <!-- data-col must match the CSS class on the corresponding table cell -->
    <button class="filter-btn active" data-sort="puzzles_since_tracking" data-col="cell-solved">Gelöste Aufgaben</button>
    <button class="filter-btn"        data-sort="puzzle_rating_now"       data-col="cell-rating">Taktik-Wertung</button>
    <button class="filter-btn"        data-sort="avg_bullet_blitz_rapid"  data-col="cell-avg">Ø Spielwertung</button>
    <button class="filter-btn"        data-sort="storm_best_score"        data-col="cell-storm">Storm</button>
    <button class="filter-btn"        data-sort="racer_best_score"        data-col="cell-racer">Racer</button>
    <span class="player-count" id="showing-count"></span>
  </div>

  <div class="table-scroll">
  <div class="table-wrap">
    <div class="table-header" id="table-header">
      <span>#</span>
      <span>Spieler</span>
      <span class="sorted" data-sort="puzzles_since_tracking" data-col="cell-solved"  style="text-align:right">Gelöst ▾</span>
      <span                 data-sort="puzzle_rating_now"      data-col="cell-rating"  style="text-align:right">Taktik-Wertung</span>
      <span                 data-sort="avg_bullet_blitz_rapid" data-col="cell-avg"     style="text-align:right">Ø Spielwertung</span>
      <span                 data-sort="storm_best_score"       data-col="cell-storm"   style="text-align:right">Storm</span>
      <span                 data-sort="racer_best_score"       data-col="cell-racer"   style="text-align:right">Racer</span>
    </div>
    <div id="table-body"></div>
  </div>
  </div>

  <footer>
    <span>Daten via <a href="https://lichess.org/api" target="_blank" rel="noopener">Lichess API</a> · alle 10 Minuten aktualisiert</span>
    <a href="https://lichess.org/team/taktikspektakel" target="_blank" rel="noopener">→ Teamseite</a>
  </footer>

</div>
<script>
// ── CSV ────────────────────────────────────────────────────────────────────
function parseCSV(text) {
  const lines = text.trim().split('\n');
  const headers = lines[0].split(',').map(h => h.trim().replace(/\r/g,''));
  return lines.slice(1).map(line => {
    const vals = line.split(',').map(v => v.trim().replace(/\r/g,''));
    const obj = {};
    headers.forEach((h,i) => obj[h] = vals[i] || '');
    return obj;
  });
}

function fmt(val, fallback='—') {
  if (val==='' || val==null || val==='None') return fallback;
  const n = parseFloat(val);
  return isNaN(n) ? fallback : Math.round(n).toLocaleString('de-DE');
}
function lichessUrl(u) { return `https://lichess.org/@/${u}`; }
function initials(u)   { return u.slice(0,2).toUpperCase(); }

// ── State ──────────────────────────────────────────────────────────────────
let allPlayers = [];
let sortKey    = 'puzzles_since_tracking';
let activeCol  = 'cell-solved';  // CSS class of the column shown on mobile
let searchTerm = '';

// all data-column CSS classes, in the same order as the table columns
const DATA_COLS = ['cell-solved','cell-rating','cell-avg','cell-storm','cell-racer'];

// ── Mobile column visibility ───────────────────────────────────────────────
// Adds .col-hidden to every data column that is NOT the active one.
// The media query hides .col-hidden on screens ≤ 640 px.
function applyMobileCols() {
  // header
  document.querySelectorAll('#table-header span[data-col]').forEach(th => {
    th.classList.toggle('col-hidden', th.dataset.col !== activeCol);
  });
  // rows
  document.querySelectorAll('#table-body .row').forEach(row => {
    DATA_COLS.forEach(cls => {
      const cell = row.querySelector('.'+cls);
      if (cell) cell.classList.toggle('col-hidden', cls !== activeCol);
    });
  });
}

// ── Podium ─────────────────────────────────────────────────────────────────
function renderPodium(players, compact = false) {
  const top3    = players.slice(0,3);
  const classes = ['p2','p1','p3'];
  const orders  = [2,1,3];
  const pieces  = ['♛','♚','♜'];
  const arr     = [top3[1], top3[0], top3[2]];

  document.getElementById('podium').innerHTML = arr.map((p,i) => {
    if (!p) return '';
    return `
      <div class="podium-card ${classes[i]}" style="order:${orders[i]}">
        <div class="podium-piece">${pieces[i]}</div>
        <div class="podium-rank">${p.rank}</div>
        <div class="podium-name"><a href="${lichessUrl(p.username)}" target="_blank" rel="noopener">${p.username}</a></div>
        <div class="podium-solved"><strong>${fmt(p.puzzles_since_tracking)}</strong>Aufgaben gelöst</div>
        <div class="podium-rating">${fmt(p.puzzle_rating_now)}</div>
      </div>`;
  }).join('');
}

// ── Table ──────────────────────────────────────────────────────────────────
function renderTable(players) {
  const body = document.getElementById('table-body');
  if (!players.length) {
    body.innerHTML = '<div class="empty">Keine Spieler gefunden.</div>';
    return;
  }
  body.innerHTML = players.map((p,i) => {
    const isTop3 = p.rank <= 3;
    let badge = '';
    if      (p.rank===1) badge='<span class="badge badge-gold">♚</span>';
    else if (p.rank===2) badge='<span class="badge badge-silver">♛</span>';
    else if (p.rank===3) badge='<span class="badge badge-bronze">♜</span>';

    const storm = fmt(p.storm_best_score);
    const racer = fmt(p.racer_best_score);

    return `
      <div class="row${isTop3?' top3':''}" style="animation-delay:${Math.min(i*0.025,0.5)}s">
        <div class="cell-rank">${p.rank}</div>
        <div class="cell-player">
          <div class="avatar">${initials(p.username)}</div>
          <div class="player-name">
            <a href="${lichessUrl(p.username)}" target="_blank" rel="noopener">${p.username}</a>${badge}
          </div>
        </div>
        <div class="cell-solved">${fmt(p.puzzles_since_tracking)}</div>
        <div class="cell-rating">${fmtRating(p.puzzle_rating_now)}</div>
        <div class="cell-avg">${fmt(p.avg_bullet_blitz_rapid)}</div>
        <div class="cell-storm">${storm==='—'?'<span style="color:#444">—</span>':`<span>⚡ ${storm}</span>`}</div>
        <div class="cell-racer">${racer==='—'?'<span style="color:#444">—</span>':`<span>🏁 ${racer}</span>`}</div>
      </div>`;
  }).join('');
}

// ── Filter + sort ──────────────────────────────────────────────────────────
function getFiltered() {
  let list = [...allPlayers];
  if (searchTerm) list = list.filter(p => p.username.toLowerCase().includes(searchTerm));
  list.sort((a,b) => (parseFloat(b[sortKey])||0) - (parseFloat(a[sortKey])||0));
  list.forEach((p,i) => p._rank = i+1);
  return list;
}

function fmtRating(val) {
  const n = fmt(val);
  if (n === '—') return '<span style="color:var(--muted);font-size:11px">keine Wertung</span>';
  return n;
}

function render() {
  const filtered = getFiltered();

  document.getElementById('showing-count').textContent =
    searchTerm ? `${filtered.length} von ${allPlayers.length} Spielern` : `${allPlayers.length} Spieler`;

  const isDefault = !searchTerm && sortKey==='puzzles_since_tracking';
  const podiumEl  = document.getElementById('podium');
  podiumEl.classList.toggle('podium-compact', !isDefault);
  renderPodium(allPlayers.slice(0,3), !isDefault);

  renderTable(filtered.map(p => ({...p, rank: p._rank})));
  applyMobileCols();
}

// ── setSort ────────────────────────────────────────────────────────────────
function setSort(key, col) {
  sortKey   = key;
  activeCol = col;

  document.querySelectorAll('.filter-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.sort===key));

  document.querySelectorAll('#table-header span[data-sort]').forEach(th => {
    const active = th.dataset.sort===key;
    th.classList.toggle('sorted', active);
    const base = th.textContent.replace(' ▾','').replace(' ▴','');
    th.textContent = active ? base+' ▾' : base;
  });

  render();
}

// ── Load ───────────────────────────────────────────────────────────────────
async function loadData() {
  try {
    const text = await (await fetch('data/leaderboard.csv')).text();
    allPlayers = parseCSV(text).filter(p => p.username);

    const lastSeen = allPlayers[0]?.last_seen || '—';
    document.getElementById('last-updated').textContent =
      lastSeen.includes('T') ? lastSeen.replace('T',' ').substring(0,16)+' UTC' : lastSeen;
    document.getElementById('total-players').textContent = allPlayers.length;
    render();
  } catch(e) {
    document.getElementById('table-body').innerHTML =
      '<div class="empty">leaderboard.csv konnte nicht geladen werden.</div>';
    console.error(e);
  }
}

// ── Events ─────────────────────────────────────────────────────────────────
document.getElementById('search').addEventListener('input', e => {
  searchTerm = e.target.value.trim().toLowerCase();
  render();
});

document.querySelectorAll('.filter-btn').forEach(btn =>
  btn.addEventListener('click', () => setSort(btn.dataset.sort, btn.dataset.col)));

document.querySelectorAll('#table-header span[data-sort]').forEach(th =>
  th.addEventListener('click', () => {
    const btn = document.querySelector(`.filter-btn[data-sort="${th.dataset.sort}"]`);
    setSort(th.dataset.sort, btn ? btn.dataset.col : activeCol);
  }));

loadData();

// Auto-refresh alle 5 Minuten — lädt nur die CSV neu, kein Seitenreload
setInterval(async () => {
  try {
    const res   = await fetch('data/leaderboard.csv?t=' + Date.now()); // cache-bust
    const text  = await res.text();
    const fresh = parseCSV(text).filter(p => p.username);
    if (fresh.length === 0) return;
    allPlayers = fresh;
    const lastSeen = allPlayers[0]?.last_seen || '—';
    document.getElementById('last-updated').textContent =
      lastSeen.includes('T') ? lastSeen.replace('T',' ').substring(0,16)+' UTC' : lastSeen;
    document.getElementById('total-players').textContent = allPlayers.length;
    render();
  } catch(e) {
    console.warn('Auto-refresh fehlgeschlagen:', e);
  }
}, 5 * 60 * 1000);
</script>
</body>
</html>
